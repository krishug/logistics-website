<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>速达物流管理系统 | 登录注册</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Login page specific styles */
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--surface);
    }

    .login-shell {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 32px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, #1e40af, #1a56db);
      color: #fff;
    }

    .login-brand .brand-icon {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      margin-bottom: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      font-size: 24px;
      font-weight: 800;
    }

    .login-brand h1 {
      margin-bottom: 12px;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.1;
    }

    .login-brand .tagline {
      margin-bottom: 24px;
      opacity: 0.8;
      font-size: 15px;
      line-height: 1.6;
    }

    .login-brand .steps {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .login-brand .steps span {
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      font-size: 13px;
      font-weight: 600;
    }

    .login-brand .steps i {
      opacity: 0.4;
      font-style: normal;
      align-self: center;
    }

    .login-card {
      padding: 28px;
      border-radius: var(--radius);
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .login-card .card-head {
      margin-bottom: 20px;
    }

    .login-card .card-head .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
    }

    .login-card .card-head h2 {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 800;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .mode-tabs button {
      min-height: 42px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      background: var(--white);
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      transition: all var(--transition);
    }

    .mode-tabs button.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--white);
    }

    .login-card form {
      display: flex;
      flex-direction: column;
    }

    .login-card form.hidden {
      display: none;
    }

    .login-card .field {
      margin-bottom: 16px;
    }

    .login-card .field:last-of-type {
      margin-bottom: 20px;
    }

    .login-card .submit-btn {
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }

    .login-card .submit-btn:hover {
      background: var(--primary-dark);
    }

    .login-card .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-card .error-text {
      min-height: 24px;
      margin-top: 12px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
    }

    .login-card .back-link {
      display: block;
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .login-card .back-link:hover {
      color: var(--primary);
    }

    @media (max-width: 768px) {
      .login-shell {
        grid-template-columns: 1fr;
      }
      .login-brand {
        padding: 28px 24px;
        border-radius: var(--radius);
      }
    }

    @media (max-width: 480px) {
      .login-page {
        padding: 12px;
      }
      .login-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body class="login-page">
  <div style="position:fixed;top:16px;right:16px;z-index:100">
    <div class="lang-switch" style="background:rgba(255,255,255,0.9);border-radius:8px;padding:3px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
      <button class="active" data-lang="zh" aria-label="切换到中文">中</button>
      <button data-lang="en" aria-label="Switch to English">EN</button>
    </div>
  </div>

  <div class="login-shell">
    <section class="login-brand">
      <div class="brand-icon">速</div>
      <h1>速达物流</h1>
      <p class="tagline" data-i18n="login.tagline">
        统一登录注册入口，系统会根据账号身份自动进入管理员端、仓库端、财务端或用户端页面。
      </p>
      <div class="steps">
        <span data-i18n="login.step1">登录</span>
        <i>→</i>
        <span data-i18n="login.step2">身份识别</span>
        <i>→</i>
        <span data-i18n="login.step3">进入工作台</span>
      </div>
    </section>

    <section class="login-card">
      <div class="card-head">
        <span class="badge" data-i18n="login.badge">统一入口</span>
        <h2 data-i18n="login.title">登录注册</h2>
      </div>

      <div class="mode-tabs">
        <button class="active" type="button" data-mode="login" data-i18n="login.tab_login">登录</button>
        <button type="button" data-mode="register" data-i18n="login.tab_register">注册</button>
      </div>

      <form data-login-form>
        <label class="field">
          <span data-i18n="login.username">账号</span>
          <input name="username" type="text" data-i18n-placeholder="login.ph_username" placeholder="请输入账号" required autocomplete="off">
        </label>
        <label class="field">
          <span data-i18n="login.password">密码</span>
          <input name="password" type="password" data-i18n-placeholder="login.ph_password" placeholder="请输入密码" required autocomplete="new-password">
        </label>
        <button class="submit-btn" type="submit" data-i18n="login.btn_login">登录</button>
      </form>

      <form class="hidden" data-register-form>
        <label class="field">
          <span data-i18n="login.realName">姓名</span>
          <input name="realName" type="text" data-i18n-placeholder="login.ph_realName" placeholder="请输入真实姓名" autocomplete="name">
        </label>
        <label class="field">
          <span data-i18n="login.username">账号</span>
          <input name="username" type="text" data-i18n-placeholder="login.ph_reg_username" placeholder="设置登录账号" required autocomplete="off">
        </label>
        <label class="field">
          <span data-i18n="login.password">密码</span>
          <input name="password" type="password" data-i18n-placeholder="login.ph_reg_password" placeholder="设置登录密码" required autocomplete="new-password">
        </label>
        <button class="submit-btn" type="submit" data-i18n="login.btn_register">注册普通用户</button>
      </form>

      <p class="error-text" data-error></p>
      <a href="/" class="back-link" data-i18n="login.back">← 返回官网首页</a>
    </section>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
