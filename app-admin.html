<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员端 | 速达物流管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <div class="mobile-topbar">
      <button class="icon-btn" id="sidebarToggle">☰</button>
      <div><strong>管理员端</strong><span>速达物流管理系统</span></div>
    </div>
    <div class="workbench">
      <div class="hero-strip">
        <div>
          <div class="route">总览 · 管理中心</div>
          <h1>管理员端</h1>
        </div>
        <div class="hero-stat">
          <strong>--</strong>
          <span>今日运单</span>
        </div>
      </div>
      <div class="layout">
        <nav class="side-nav" id="sideNav">
          <button class="active">总览看板</button>
          <button>运单管理</button>
          <button>用户管理</button>
          <button>车辆管理</button>
          <button>线路管理</button>
          <button class="nav-logout" id="logoutBtn">退出登录</button>
        </nav>
        <main class="main-stack">
          <div class="panel">
            <div class="panel-title"><h2>总览看板</h2></div>
            <div class="overview-metrics">
              <div><small>今日运单</small><strong>--</strong><span>较昨日 --</span></div>
              <div><small>进行中</small><strong>--</strong><span>运输途中</span></div>
              <div><small>已完成</small><strong>--</strong><span>本月累计</span></div>
              <div><small>注册用户</small><strong>--</strong><span>总计</span></div>
            </div>
            <div style="margin-top:24px;padding:32px;text-align:center;color:var(--muted);border:2px dashed var(--line);border-radius:8px;">
              <p style="font-size:18px;font-weight:700;margin-bottom:8px;">管理端功能开发中</p>
              <p>此页面为占位页面，后续将实现完整的运单管理、用户管理、数据看板等功能。</p>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
  <script>
    (function () {
      var auth = window.DmAuth;
      if (!auth.requireRole('admin')) return;

      document.getElementById('logoutBtn').addEventListener('click', function () {
        auth.clearAuth();
        location.href = '/login.html';
      });

      // Simple sidebar toggle
      document.getElementById('sidebarToggle').addEventListener('click', function () {
        var nav = document.getElementById('sideNav');
        nav.style.display = nav.style.display === 'none' ? 'grid' : 'none';
      });
    })();
  </script>
</body>
</html>
